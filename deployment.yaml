apiVersion: apps/v1
kind: Deployment
metadata:
  name: blip-deployment
  namespace: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app: blip
  template:
    metadata:
      labels:
        app: blip
    spec:
      containers:
        - name: blip-container
          image: gcr.io/blip-project-2026-tn/blip-app:v6
          ports:
            - containerPort: 5000