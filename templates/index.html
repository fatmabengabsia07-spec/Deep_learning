<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caption Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #f4efe7;
            --bg-2: #e6edf5;
            --surface: #ffffff;
            --text: #1c2230;
            --muted: #5d677c;
            --primary: #0b5a79;
            --primary-hover: #08445b;
            --ring: rgba(11, 90, 121, 0.18);
            --shadow: 0 25px 60px rgba(19, 34, 54, 0.16);
            --radius-lg: 22px;
            --radius-md: 14px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Plus Jakarta Sans", sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 12% 18%, rgba(35, 127, 163, 0.15), transparent 35%),
                radial-gradient(circle at 86% 10%, rgba(214, 155, 61, 0.18), transparent 38%),
                linear-gradient(140deg, var(--bg-1), var(--bg-2));
            display: grid;
            place-items: center;
            padding: 30px 16px;
        }

        .container {
            width: min(860px, 100%);
            background: rgba(255, 255, 255, 0.86);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.75);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow);
            padding: clamp(22px, 4vw, 42px);
            animation: fade-in 500ms ease-out;
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(1.5rem, 1.05rem + 2.2vw, 2.3rem);
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .subtitle {
            margin: 0 0 26px;
            color: var(--muted);
            font-size: 0.98rem;
        }

        form {
            display: grid;
            gap: 14px;
            justify-items: center;
        }

        .file-input {
            width: min(520px, 100%);
            border: 2px dashed #bfd2e2;
            border-radius: var(--radius-md);
            background: #f8fbff;
            padding: 18px;
            transition: border-color 180ms ease, background-color 180ms ease, box-shadow 180ms ease;
        }

        .file-input:hover {
            border-color: #8fb2cc;
            background: #f2f8ff;
        }

        .file-input:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 6px var(--ring);
        }

        input[type="file"] {
            width: 100%;
            color: var(--muted);
            font-weight: 500;
        }

        button {
            padding: 12px 26px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #0b5a79, #0e728f);
            color: #ffffff;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.96rem;
            letter-spacing: 0.01em;
            cursor: pointer;
            transition: transform 160ms ease, box-shadow 200ms ease, background 220ms ease;
            box-shadow: 0 12px 26px rgba(11, 90, 121, 0.28);
        }

        button:hover {
            transform: translateY(-1px);
            background: linear-gradient(135deg, var(--primary-hover), #0a6078);
        }

        button:active {
            transform: translateY(0);
        }

        .preview {
            margin-top: 28px;
            text-align: left;
        }

        .preview h2,
        .result h2 {
            margin: 0 0 10px;
            font-size: 1rem;
            color: var(--muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        img {
            width: 100%;
            max-width: 520px;
            border-radius: 16px;
            display: block;
            margin: 0 auto;
            box-shadow: 0 16px 34px rgba(22, 43, 70, 0.2);
        }

        .result {
            margin-top: 22px;
            text-align: left;
            background: #f8fbfe;
            border: 1px solid #d8e4ef;
            border-radius: 16px;
            padding: 16px;
        }

        .caption {
            margin: 0;
            color: #24314b;
            font-size: 1.03rem;
            line-height: 1.55;
            font-weight: 600;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 640px) {
            .container {
                border-radius: 18px;
                padding: 22px 16px;
            }

            .file-input {
                padding: 14px;
            }

            button {
                width: 100%;
                max-width: 520px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Image Caption Generator</h1>
    <p class="subtitle">Importez une image et obtenez une description automatique claire et instantanee.</p>

    <form method="POST" enctype="multipart/form-data">
        <div class="file-input">
            <input type="file" name="image" required>
        </div>
        <button type="submit">Analyser</button>
    </form>

    {% if image_path %}
        <section class="preview">
            <h2>Apercu de l'image</h2>
            <img src="{{ image_path }}" alt="Image importee pour l'analyse">
        </section>
    {% endif %}

    {% if caption %}
        <section class="result">
            <h2>Resultat</h2>
            <p class="caption">{{ caption }}</p>
        </section>
    {% endif %}
</div>

</body>
</html>
